<div>
  <h2>Ajouter un Contact</h2>
  <input [(ngModel)]="nom" placeholder="Nom complet **">
  <input [(ngModel)]="email" type="email" placeholder="Email **">
  <input [(ngModel)]="score" type="number" min="0" max="20" placeholder="Score (0-20) **">
  
  <select [(ngModel)]="role">
    <option value="guest">Guest</option>
    <option value="user">User</option>
    <option value="admin">Admin</option>
  </select>
  <br>
  
  <!-- Aperçu en temps réel -->
  <div *ngIf="nom" class="apercu">
    <strong>Aperçu :</strong> {{ nom }} - {{ email }} (Score: {{score}}/20, Rôle: {{role}})
  </div>

  <button (click)="sauvegarder()">+ Ajouter le contact</button>
</div>
